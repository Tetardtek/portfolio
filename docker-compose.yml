services:
  portfolio:
    build: .
    container_name: portfolio-v2
    restart: unless-stopped
    env_file:
      - .env.local
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      # CV (non commité, copié manuellement sur le VPS)
      - ./public/assets/cv:/app/public/assets/cv
    networks:
      - proxy

networks:
  proxy:
    external: true
